<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2732 2732" width="2732" height="2732">
  <!-- Background -->
  <rect width="2732" height="2732" fill="#0D0D1A"/>

  <!-- Icon: 2x3 grid, centered horizontally, slightly above vertical center -->
  <!-- Icon block: 460×460 total area, positioned at center (2732/2 = 1366) -->
  <!-- Grid centered at x=1136 to 1596 (460 wide), y=1050 to 1510 (460 tall) -->
  <g transform="translate(1136, 1050)">
    <!-- Block dimensions within 460×460 group: 210×145, rx=44 -->
    <!-- Row 1 -->
    <rect x="0"   y="0"   width="210" height="145" rx="44" fill="#7B7BFF" opacity="0.9"/>
    <rect x="250" y="0"   width="210" height="145" rx="44" fill="#7B7BFF" opacity="0.9"/>
    <!-- Row 2 -->
    <rect x="0"   y="178" width="210" height="145" rx="44" fill="#7B7BFF" opacity="0.7"/>
    <rect x="250" y="178" width="210" height="145" rx="44" fill="#7B7BFF" opacity="0.7"/>
    <!-- Row 3 -->
    <rect x="0"   y="356" width="210" height="145" rx="44" fill="#7B7BFF" opacity="0.5"/>
    <rect x="250" y="356" width="210" height="145" rx="44" fill="#5BF5A0" opacity="0.9"/>
  </g>

  <!-- Wordmark: REPLIQE with green Q -->
  <!-- Positioned below icon at y ≈ 1680 -->
  <g font-family="-apple-system, system-ui, 'Segoe UI', sans-serif" font-weight="800" letter-spacing="24" text-anchor="middle">
    <text x="1366" y="1720" font-size="132" fill="#FFFFFF">REPLI<tspan fill="#5BF5A0">Q</tspan>E</text>
  </g>

  <!-- Tagline -->
  <g font-family="-apple-system, system-ui, 'Segoe UI', sans-serif" font-weight="500" letter-spacing="10" text-anchor="middle">
    <text x="1366" y="1840" font-size="72" fill="#9A9AB8">SIMPLE TRACKING. REAL PROGRESS.</text>
  </g>
</svg>
