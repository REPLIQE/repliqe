<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    iOS app icon, full-bleed 1024x1024 canvas.
    Grid composition is scaled to ~72% of the canvas (blocks 280x190, rx 59,
    horizontal gap 59, vertical gap 45) and centered, leaving ~17-20% padding
    on every side so the icon visually matches Apple's stock apps (Fitness,
    Watch, Contacts) on the home screen.
    Block geometry:
      Col 1 x = 203, Col 2 x = 542, block width 280
      Row 1 y = 182, Row 2 y = 417, Row 3 y = 652, block height 190
      Grid bbox: x 203..822 (619w), y 182..842 (660h)
      Margins: left/right 203/202, top/bottom 182/182 (centered)
  -->
  <rect width="1024" height="1024" fill="#0D0D1A"/>
  <!-- Row 1 (top) -->
  <rect x="203" y="182" width="280" height="190" rx="59" fill="#7B7BFF" opacity="0.9"/>
  <rect x="542" y="182" width="280" height="190" rx="59" fill="#7B7BFF" opacity="0.9"/>
  <!-- Row 2 (mid) -->
  <rect x="203" y="417" width="280" height="190" rx="59" fill="#7B7BFF" opacity="0.7"/>
  <rect x="542" y="417" width="280" height="190" rx="59" fill="#7B7BFF" opacity="0.7"/>
  <!-- Row 3 (bottom) -->
  <rect x="203" y="652" width="280" height="190" rx="59" fill="#7B7BFF" opacity="0.5"/>
  <rect x="542" y="652" width="280" height="190" rx="59" fill="#5BF5A0" opacity="0.9"/>
</svg>
